{% extends "base.html" %}
{% block title %}{{ action }} Application - Job Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} Application</h1>
    <a href="{{ url_for('applications_list') }}" class="btn btn-secondary">&larr; Back to List</a>
</div>

<div class="card form-card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="job_id">Job</label>
                <select id="job_id" name="job_id">
                    <option value="">— Select Job —</option>
                    {% for j in jobs %}
                    <option value="{{ j.job_id }}" {{ 'selected' if app.get('job_id') == j.job_id }}>
                        {{ j.job_title }} ({{ j.company_name or 'No Company' }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="application_date">Application Date <span class="required">*</span></label>
                <input type="date" id="application_date" name="application_date"
                       value="{{ app.get('application_date', '') }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    {% for s in ['Applied', 'Screening', 'Interview', 'Offer', 'Rejected', 'Withdrawn'] %}
                    <option value="{{ s }}" {{ 'selected' if app.get('status') == s }}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="resume_version">Resume Version</label>
                <input type="text" id="resume_version" name="resume_version"
                       value="{{ app.get('resume_version', '') }}" placeholder="e.g. v2.1">
            </div>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="cover_letter_sent" value="1"
                       {{ 'checked' if app.get('cover_letter_sent') }}>
                Cover letter sent
            </label>
        </div>

        <fieldset class="form-fieldset">
            <legend>Interview Details (optional)</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="interview_round">Round</label>
                    <input type="text" id="interview_round" name="interview_round"
                           value="{{ app.get('interview_round', '') }}" placeholder="e.g. 1">
                </div>
                <div class="form-group">
                    <label for="interview_type">Type</label>
                    <input type="text" id="interview_type" name="interview_type"
                           value="{{ app.get('interview_type', '') }}" placeholder="e.g. Phone Screen">
                </div>
                <div class="form-group">
                    <label for="interview_scheduled">Scheduled Date</label>
                    <input type="date" id="interview_scheduled" name="interview_scheduled"
                           value="{{ app.get('interview_scheduled', '') }}">
                </div>
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ action }} Application</button>
            <a href="{{ url_for('applications_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
