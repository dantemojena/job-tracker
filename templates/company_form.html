{% extends "base.html" %}
{% block title %}{{ action }} Company - Job Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} Company</h1>
    <a href="{{ url_for('companies_list') }}" class="btn btn-secondary">&larr; Back to List</a>
</div>

<div class="card form-card">
    <form method="POST">
        <div class="form-group">
            <label for="company_name">Company Name <span class="required">*</span></label>
            <input type="text" id="company_name" name="company_name"
                   value="{{ company.get('company_name', '') }}" required placeholder="e.g. Google">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="industry">Industry</label>
                <input type="text" id="industry" name="industry"
                       value="{{ company.get('industry', '') }}" placeholder="e.g. Technology">
            </div>
            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" name="website"
                       value="{{ company.get('website', '') }}" placeholder="https://example.com">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city"
                       value="{{ company.get('city', '') }}" placeholder="e.g. Miami">
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state"
                       value="{{ company.get('state', '') }}" placeholder="e.g. FL">
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3"
                      placeholder="Any additional notes...">{{ company.get('notes', '') }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ action }} Company</button>
            <a href="{{ url_for('companies_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
