{% extends "base.html" %}
{% block title %}{{ action }} Job - Job Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} Job</h1>
    <a href="{{ url_for('jobs_list') }}" class="btn btn-secondary">&larr; Back to List</a>
</div>

<div class="card form-card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="job_title">Job Title <span class="required">*</span></label>
                <input type="text" id="job_title" name="job_title"
                       value="{{ job.get('job_title', '') }}" required placeholder="e.g. Software Developer">
            </div>
            <div class="form-group">
                <label for="company_id">Company</label>
                <select id="company_id" name="company_id">
                    <option value="">— Select Company —</option>
                    {% for c in companies %}
                    <option value="{{ c.company_id }}" {{ 'selected' if job.get('company_id') == c.company_id }}>
                        {{ c.company_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="job_type">Job Type</label>
                <select id="job_type" name="job_type">
                    {% for t in ['Full-time', 'Part-time', 'Contract', 'Internship'] %}
                    <option value="{{ t }}" {{ 'selected' if job.get('job_type') == t }}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="date_posted">Date Posted</label>
                <input type="date" id="date_posted" name="date_posted"
                       value="{{ job.get('date_posted', '') }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="salary_min">Salary Min ($)</label>
                <input type="number" id="salary_min" name="salary_min"
                       value="{{ job.get('salary_min', '') }}" placeholder="e.g. 60000">
            </div>
            <div class="form-group">
                <label for="salary_max">Salary Max ($)</label>
                <input type="number" id="salary_max" name="salary_max"
                       value="{{ job.get('salary_max', '') }}" placeholder="e.g. 90000">
            </div>
        </div>

        <div class="form-group">
            <label for="job_url">Job URL</label>
            <input type="url" id="job_url" name="job_url"
                   value="{{ job.get('job_url', '') }}" placeholder="https://example.com/careers/position">
        </div>

        <div class="form-group">
            <label for="requirements">Required Skills (comma-separated)</label>
            <input type="text" id="requirements" name="requirements"
                   value="{{ job.get('requirements_str', '') }}" placeholder="e.g. Python, SQL, Flask, HTML">
            <small class="form-hint">Enter skills separated by commas. These are used for the Job Match feature.</small>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ action }} Job</button>
            <a href="{{ url_for('jobs_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
